<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#7c6aff"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,.07);
    --text: #f0f0f8;
    --text-dim: rgba(240,240,248,.4);
    --c1: #7c6aff;
    --c2: #a78bfa;
    --c3: #34d399;
    --c4: #fb923c;
    --c5: #f472b6;
    --c6: #f87171;
    --radius: 16px;
    --nav-h: 72px;
  }
  body.light{--bg:#f4f4f8;--surface:#ffffff;--surface2:#eeeef5;--border:rgba(0,0,0,.08);--text:#1a1a2e;--text-dim:rgba(26,26,46,.45);}
  body.light::before{background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(124,106,255,.05) 0%,transparent 60%);}
  body.light .header{background:rgba(244,244,248,.92);}
  body.light .bottom-nav{background:rgba(244,244,248,.95);}
  body.light .task-item:hover{border-color:rgba(0,0,0,.12);}
  .theme-btn{width:34px;height:34px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .theme-btn:hover{border-color:var(--c1);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  
  /* BACKGROUND */
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(124,106,255,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(167,139,250,.08) 0%,transparent 50%);pointer-events:none;z-index:0;}

  /* HEADER */
  .header{position:sticky;top:0;z-index:100;padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sync-btn{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
  .sync-btn.synced{border-color:rgba(52,211,153,.3);color:var(--c3);}
  .sync-btn.synced .sync-dot{background:var(--c3);box-shadow:0 0 6px var(--c3);}
  .sync-btn.syncing{border-color:rgba(124,106,255,.3);color:var(--c1);}
  .sync-btn.syncing .sync-dot{background:var(--c1);animation:pulse 1s infinite;}
  .sync-btn.pending{border-color:rgba(251,146,60,.3);color:var(--c4);}
  .sync-btn.pending .sync-dot{background:var(--c4);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* FIREBASE CONFIG BANNER */
  .config-banner{background:linear-gradient(135deg,rgba(124,106,255,.15),rgba(167,139,250,.1));border:1px solid rgba(124,106,255,.3);border-radius:var(--radius);padding:20px;margin:16px 20px;display:none;}
  .config-banner.show{display:block;}
  .config-banner h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:10px;color:var(--c2);}
  .config-banner p{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:14px;}
  .config-inputs{display:flex;flex-direction:column;gap:8px;}
  .config-input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
  .config-input:focus{border-color:var(--c1);}
  .config-input::placeholder{color:var(--text-dim);}
  .config-save-btn{margin-top:6px;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;border-radius:10px;padding:11px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:100%;}

  /* AI INPUT */
  .ai-wrap{padding:14px 20px 0;position:relative;z-index:1;}
  .ai-row{display:flex;gap:8px;align-items:center;}
  .ai-field{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
  .ai-field:focus{border-color:var(--c1);}
  .ai-field::placeholder{color:var(--text-dim);}
  .mic-btn{width:42px;height:42px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .mic-btn.recording{background:rgba(248,113,113,.15);border-color:var(--c6);color:var(--c6);animation:pulse 1s infinite;}
  .ai-btn{height:42px;padding:0 16px;border-radius:12px;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:0 4px 16px rgba(124,106,255,.3);transition:opacity .2s;}
  .ai-btn:hover{opacity:.9;}
  .ai-hint{font-size:11px;color:var(--text-dim);margin-top:6px;padding:0 4px;}
  .ai-thinking{display:none;align-items:center;gap:8px;padding:8px 20px;font-size:13px;color:var(--c1);}
  .ai-thinking.show{display:flex;}
  .ai-dot{width:6px;height:6px;border-radius:50%;background:var(--c1);animation:bounce .8s infinite;}
  .ai-dot:nth-child(2){animation-delay:.15s;}
  .ai-dot:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}

  /* PROJECTS */
  .section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
  .projects-area{padding:16px 20px 0;position:relative;z-index:1;}
  .projects-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .projects-scroll::-webkit-scrollbar{display:none;}
  .proj-chip{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
  .proj-chip:hover{border-color:rgba(255,255,255,.15);}
  .proj-chip.active{border-color:transparent;color:#fff;}
  .proj-chip .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .proj-chip .chip-cnt{font-size:11px;opacity:.6;font-weight:700;}
  .add-proj-chip{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1.5px dashed rgba(255,255,255,.15);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .2s;}
  .add-proj-chip:hover{border-color:var(--c1);color:var(--c1);}

  /* STATS */
  .stats{display:flex;gap:10px;padding:14px 20px 0;position:relative;z-index:1;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
  .stat-n{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;}
  .stat-l{font-size:11px;color:var(--text-dim);margin-top:4px;font-weight:500;}
  .stat-ring{flex:1.4;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;}
  .ring-svg{flex-shrink:0;}
  circle.rb{fill:none;stroke:var(--surface2);stroke-width:5;}
  circle.rf{fill:none;stroke:url(#rg);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s ease;}

  /* ADD TASK */
  .add-task-area{padding:14px 20px 0;position:relative;z-index:1;}
  .add-row{display:flex;gap:8px;}
  .add-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
  .add-input:focus{border-color:var(--c1);}
  .add-input::placeholder{color:var(--text-dim);}
  .add-btn{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(124,106,255,.35);transition:opacity .2s;}
  .add-btn:hover{opacity:.9;}

  /* TASKS */
  .tasks-area{padding:14px 20px;padding-bottom:calc(var(--nav-h) + 20px);position:relative;z-index:1;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 14px 14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:fadeUp .3s ease;}
  .task-item:hover{border-color:rgba(255,255,255,.12);transform:translateY(-1px);}
  .task-item.done{opacity:.5;}
  .task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s;cursor:pointer;}
  .task-check:hover{border-color:var(--c1);}
  .task-check.done-check{border-color:transparent;}
  .task-check-inner{font-size:11px;opacity:0;transition:opacity .2s;}
  .task-check.done-check .task-check-inner{opacity:1;}
  .task-body{flex:1;min-width:0;}
  .task-title{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:4px;}
  .task-item.done .task-title{text-decoration:line-through;color:var(--text-dim);}
  .task-note-preview{font-size:12px;color:var(--text-dim);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .task-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .task-proj{font-size:11px;font-weight:600;}
  .task-date{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:3px;}
  .task-date.overdue{color:var(--c6);}
  .task-priority{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;}
  .priority-high{background:rgba(248,113,113,.15);color:var(--c6);}
  .priority-med{background:rgba(251,146,60,.15);color:var(--c4);}
  .priority-low{background:rgba(52,211,153,.15);color:var(--c3);}
  .task-actions{display:flex;gap:4px;flex-shrink:0;}
  .task-act{width:28px;height:28px;border-radius:8px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .task-act:hover{background:var(--surface2);color:var(--text);}
  .task-act.del:hover{color:var(--c6);}
  .task-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;}
  .sub-progress{height:3px;background:var(--surface2);border-radius:2px;margin-top:6px;overflow:hidden;}
  .sub-progress-fill{height:100%;border-radius:2px;transition:width .4s;}
  .empty{text-align:center;padding:48px 20px;color:var(--text-dim);}
  .empty-icon{font-size:44px;margin-bottom:12px;opacity:.5;}

  /* CALENDAR */
  .cal-wrap{padding:0 20px;padding-bottom:calc(var(--nav-h) + 20px);}
  .cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0;}
  .cal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
  .cal-nav{width:36px;height:36px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .cal-nav:hover{border-color:var(--c1);color:var(--c1);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
  .cal-day-lbl{text-align:center;font-size:11px;color:var(--text-dim);font-weight:600;padding:6px 0;}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13px;cursor:pointer;transition:all .2s;position:relative;border:1px solid transparent;}
  .cal-day:hover{background:var(--surface2);}
  .cal-day.other{color:var(--text-dim);opacity:.4;}
  .cal-day.today{background:rgba(124,106,255,.15);border-color:rgba(124,106,255,.3);color:var(--c2);font-weight:700;}
  .cal-day.selected{background:var(--c1);color:#fff;font-weight:700;}
  .cal-day.has-tasks::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--c3);}
  .cal-day.selected::after{background:#fff;}
  .cal-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}

  /* NOTES */
  .notes-wrap{padding:0 20px;padding-bottom:calc(var(--nav-h) + 20px);}
  .notes-toolbar{display:flex;gap:8px;padding:14px 0;}
  .notes-search{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
  .notes-search:focus{border-color:var(--c1);}
  .notes-search::placeholder{color:var(--text-dim);}
  .new-note-btn{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(124,106,255,.3);}
  .notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:fadeUp .3s ease;}
  .note-card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px);}
  .note-bar{position:absolute;top:0;left:0;right:0;height:3px;}
  .note-title{font-size:14px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .note-preview{font-size:12px;color:var(--text-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .note-footer{display:flex;justify-content:space-between;margin-top:10px;}
  .note-date{font-size:10px;color:var(--text-dim);}
  .note-del{position:absolute;top:8px;right:8px;background:none;border:none;color:transparent;cursor:pointer;font-size:13px;transition:color .2s;padding:4px;}
  .note-card:hover .note-del{color:var(--text-dim);}
  .note-del:hover{color:var(--c6)!important;}
  .notes-empty{text-align:center;padding:40px 20px;color:var(--text-dim);grid-column:1/-1;}

  /* NOTE EDITOR */
  .note-editor{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .2s;}
  .note-editor.open{opacity:1;pointer-events:all;}
  .note-editor-top{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.9);backdrop-filter:blur(20px);flex-shrink:0;}
  .note-back{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;padding:4px;transition:color .2s;}
  .note-back:hover{color:var(--text);}
  .note-title-inp{flex:1;background:none;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:18px;font-weight:800;outline:none;}
  .note-save{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
  .note-save:hover{border-color:var(--c1);color:var(--c1);}
  .note-color-strip{height:4px;flex-shrink:0;transition:background .3s;}
  .note-body{flex:1;overflow-y:auto;padding:20px;}
  .note-textarea{width:100%;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.8;outline:none;resize:none;min-height:300px;}
  .note-textarea::placeholder{color:var(--text-dim);}
  .note-colors{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;}
  .nc{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;}
  .nc.on{border-color:#fff;transform:scale(1.2);}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;cursor:pointer;padding:8px 12px;border-radius:12px;transition:all .2s;min-width:56px;flex:1;}
  .nav-item.active{color:var(--c1);}
  .nav-item.active .nav-icon{transform:scale(1.15);}
  .nav-icon{font-size:22px;line-height:1;transition:transform .2s;}
  @media(max-width:400px){.nav-item{padding:8px 6px;min-width:44px;font-size:9px;}.nav-icon{font-size:20px;}}
  @media(min-width:768px){#app{max-width:780px;margin:0 auto;}.bottom-nav{max-width:780px;left:50%;transform:translateX(-50%);border-radius:20px 20px 0 0;}}

  /* MODALS */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px 20px calc(env(safe-area-inset-bottom) + 24px);width:100%;max-height:92vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;}
  .modal-overlay.open .modal{transform:translateY(0);}
  @media(min-width:768px){.modal-overlay{align-items:center;}.modal{border-radius:24px;max-width:520px;margin:0 auto;max-height:85vh;}}
  .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:20px;}
  .modal-field{margin-bottom:14px;}
  .modal-label{font-size:12px;color:var(--text-dim);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
  .modal-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
  .modal-input:focus{border-color:var(--c1);}
  .modal-textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:none;height:90px;transition:border-color .2s;}
  .modal-textarea:focus{border-color:var(--c1);}
  select.modal-input{appearance:none;}
  .color-picker{display:flex;gap:8px;flex-wrap:wrap;}
  .csw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;}
  .csw.selected{border-color:#fff;transform:scale(1.15);}
  .modal-actions{display:flex;gap:8px;margin-top:20px;}
  .btn-primary{flex:1;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
  .btn-secondary{padding:13px 20px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}
  .btn-danger{padding:13px 20px;border-radius:12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--c6);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}

  /* DETAIL */
  .detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .detail-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;}
  .detail-check.done{border-color:transparent;}
  .detail-check-inner{font-size:13px;transition:opacity .2s;}
  .detail-title{flex:1;background:none;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:17px;font-weight:800;outline:none;}
  .priority-btns{display:flex;gap:6px;}
  .prio-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;}
  .prio-btn.active-high{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.3);color:var(--c6);}
  .prio-btn.active-med{background:rgba(251,146,60,.15);border-color:rgba(251,146,60,.3);color:var(--c4);}
  .prio-btn.active-low{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.3);color:var(--c3);}

  /* SUBTASKS */
  .sub-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
  .sub-item:last-child{border-bottom:none;}
  .sub-cb{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;}
  .sub-cb.done-cb{border-color:transparent;}
  .sub-cb-inner{font-size:10px;opacity:0;transition:opacity .2s;}
  .sub-cb.done-cb .sub-cb-inner{opacity:1;}
  .sub-text{flex:1;font-size:13px;}
  .sub-text.done-t{text-decoration:line-through;color:var(--text-dim);}
  .sub-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:2px 6px;}
  .sub-del:hover{color:var(--c6);}
  .add-sub-row{display:flex;gap:8px;margin-top:10px;}
  .add-sub-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
  .add-sub-btn{width:34px;height:34px;border-radius:10px;background:var(--c1);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  /* TOAST */
  .toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="logo">TaskFlow</div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
    <button class="sync-btn pending" id="syncBtn" onclick="syncNow()">
      <div class="sync-dot"></div>
      <span id="syncLabel">Настрой Firebase</span>
    </button>
  </header>

  <!-- Firebase configured -->

  <!-- AI INPUT -->
  <div class="ai-wrap" id="aiWrap">
    <div class="ai-row">
      <input class="ai-field" id="aiInput" placeholder='✨ "встреча с врачом в пятницу в 15:00"' />
      <button class="mic-btn" id="micBtn" title="Голосовой ввод">🎤</button>
      <button class="ai-btn" id="aiBtn">AI ✦</button>
    </div>
    <div class="ai-hint">Или используй обычное поле ниже ↓</div>
  </div>
  <div class="ai-thinking" id="aiThinking">
    <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
    <span>AI анализирует...</span>
  </div>

  <!-- PROJECTS -->
  <div class="projects-area" id="projArea">
    <div class="section-label">Проекты</div>
    <div class="projects-scroll" id="projScroll"></div>
  </div>

  <!-- STATS -->
  <div class="stats" id="statsBar"></div>

  <!-- ADD TASK -->
  <div class="add-task-area" id="addArea">
    <div class="add-row">
      <input class="add-input" id="newTaskInp" placeholder="Новая задача..." />
      <button class="add-btn" id="addBtn">+</button>
    </div>
  </div>

  <!-- TASKS VIEW -->
  <div id="tasksView">
    <div class="tasks-area" id="tasksList"></div>
  </div>

  <!-- CALENDAR VIEW -->
  <div id="calView" style="display:none">
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav" id="calPrev">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" id="calNext">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-panel" id="calPanel"></div>
    </div>
  </div>

  <!-- NOTES VIEW -->
  <div id="notesView" style="display:none">
    <div class="notes-wrap">
      <div class="notes-toolbar">
        <input class="notes-search" id="notesSearch" placeholder="🔍 Поиск заметок..." />
        <button class="new-note-btn" onclick="openNote(null)">+</button>
      </div>
      <div class="notes-grid" id="notesGrid"></div>
    </div>
  </div>
</div>

<!-- NOTE EDITOR -->
<div class="note-editor" id="noteEditor">
  <div class="note-editor-top">
    <button class="note-back" id="noteBack">←</button>
    <input class="note-title-inp" id="noteTitleInp" placeholder="Заголовок..." />
    <button class="note-save" id="noteSaveBtn">Сохранить</button>
  </div>
  <div class="note-color-strip" id="noteStrip"></div>
  <div class="note-body">
    <textarea class="note-textarea" id="noteTextarea" placeholder="Начни писать..."></textarea>
  </div>
  <div class="note-colors" id="noteColors"></div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="projModal">
  <div class="modal">
    <div class="modal-title">Новый проект</div>
    <div class="modal-field"><div class="modal-label">Название</div><input class="modal-input" id="projName" placeholder="Мой проект..." /></div>
    <div class="modal-field"><div class="modal-label">Цвет</div><div class="color-picker" id="colorPicker"></div></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('projModal')">Отмена</button>
      <button class="btn-primary" onclick="saveProject()">Создать</button>
    </div>
  </div>
</div>

<!-- TASK DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="detail-header">
      <div class="detail-check" id="detailCheck"><span class="detail-check-inner">✓</span></div>
      <input class="detail-title" id="detailTitle" placeholder="Название задачи" />
    </div>
    <div class="modal-field"><div class="modal-label">Заметка</div><textarea class="modal-textarea" id="detailNote" placeholder="Детали, ссылки..."></textarea></div>
    <div class="modal-field"><div class="modal-label">Проект</div><select class="modal-input" id="detailProj"></select></div>
    <div class="modal-field"><div class="modal-label">Приоритет</div>
      <div class="priority-btns">
        <button class="prio-btn" data-p="high" onclick="setPrio('high')">🔴 Высокий</button>
        <button class="prio-btn" data-p="med" onclick="setPrio('med')">🟡 Средний</button>
        <button class="prio-btn" data-p="low" onclick="setPrio('low')">🟢 Низкий</button>
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Дата и время</div>
      <div style="display:flex;gap:8px">
        <input class="modal-input" type="date" id="detailDate" style="flex:1" />
        <input class="modal-input" type="time" id="detailTime" style="width:120px;flex-shrink:0" />
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Повторение</div>
      <div class="priority-btns" id="recurBtns">
        <button class="prio-btn" data-r="" onclick="setRecur('')">Нет</button>
        <button class="prio-btn" data-r="daily" onclick="setRecur('daily')">Ежедневно</button>
        <button class="prio-btn" data-r="weekly" onclick="setRecur('weekly')">Еженед.</button>
        <button class="prio-btn" data-r="monthly" onclick="setRecur('monthly')">Ежемес.</button>
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Подзадачи</div>
      <div id="subList"></div>
      <div class="add-sub-row">
        <input class="add-sub-inp" id="subInp" placeholder="Добавить подзадачу..." />
        <button class="add-sub-btn" onclick="addSub()">+</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" onclick="deleteTask()">Удалить</button>
      <button class="btn-primary" onclick="saveDetail();closeModal('detailModal');toast('Сохранено!')">💾 Сохранить</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="navTasks" onclick="setView('tasks')"><div class="nav-icon">✓</div><span>Задачи</span></button>
  <button class="nav-item" id="navCal" onclick="setView('cal')"><div class="nav-icon">📅</div><span>Календарь</span></button>
  <button class="nav-item" id="navNotes" onclick="setView('notes')"><div class="nav-icon">📝</div><span>Заметки</span></button>
  <button class="nav-item" id="navDone" onclick="setView('done')"><div class="nav-icon">★</div><span>Готово</span></button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
// ========== FIREBASE ==========
const CLAUDE_URL = 'https://api.anthropic.com/v1/messages';
const COLORS = ['#7c6aff','#f472b6','#fb923c','#34d399','#60a5fa','#a78bfa','#f87171','#fbbf24'];
const NOTE_COLORS = ['#7c6aff','#f472b6','#fb923c','#34d399','#60a5fa','#a78bfa'];

let db = null;
let fbAvailable = false;
let curView = 'tasks';
let curTask = null;
let curNote = null;
let noteColor = NOTE_COLORS[0];
let selColor = COLORS[0];
let selPrio = '';
let selRecur = '';
let calDate = new Date();
let calDay = null;

// State
let S = { projects: [], tasks: [], subtasks: [], notes: [], activeProject: 'all' };

// UID
let UID = localStorage.getItem('tf_uid') || ('u_' + Math.random().toString(36).slice(2,10));
localStorage.setItem('tf_uid', UID);

// ========== LOCAL STORAGE ==========
function saveLocal() {
  localStorage.setItem('tf_data', JSON.stringify(S));
}
function loadLocal() {
  try {
    const r = JSON.parse(localStorage.getItem('tf_data') || 'null');
    if (r) { S.projects = r.projects||[]; S.tasks = r.tasks||[]; S.subtasks = r.subtasks||[]; S.notes = r.notes||[]; }
  } catch(e) {}
}

// ========== FIREBASE SETUP ==========
function loadFirebaseConfig() {
  return {
    apiKey: "AIzaSyBRK7VpUFwe7etOb1nPeRNI8Hs1PWP7xDQ",
    authDomain: "taskflow-1e030.firebaseapp.com",
    projectId: "taskflow-1e030",
    storageBucket: "taskflow-1e030.firebasestorage.app",
    messagingSenderId: "859069817610",
    appId: "1:859069817610:web:cebda51a30adca937990f3"
  };
}

async function initFirebase() {
  const cfg = loadFirebaseConfig();
  
  try {
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
    const { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query, where } = 
      await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    
    const app = initializeApp(cfg);
    db = getFirestore(app);
    
    // Attach methods to db for use elsewhere
    db._col = (name) => collection(db, name);
    db._setDoc = setDoc;
    db._doc = doc;
    db._getDocs = getDocs;
    db._deleteDoc = deleteDoc;
    db._query = query;
    db._where = where;
    
    fbAvailable = true;
    ss('syncing');
    await syncFromFirebase();
    ss('synced');
    toast('Синхронизировано!');
  } catch(e) {
    console.error('Firebase init error:', e);
    ss('pending');
    toast('Ошибка Firebase: ' + e.message);
  }
}

function showConfigBanner() { /* not needed */ }

// ========== FIREBASE CRUD ==========
async function fbSet(colName, id, data) {
  if (!fbAvailable) return;
  try {
    await db._setDoc(db._doc(db._col(colName), id), { ...data, uid: UID });
  } catch(e) { console.error('fbSet error:', e); }
}
async function fbDel(colName, id) {
  if (!fbAvailable) return;
  try { await db._deleteDoc(db._doc(db._col(colName), id)); } catch(e) {}
}
async function fbGetAll(colName) {
  if (!fbAvailable) return [];
  try {
    const q = db._query(db._col(colName), db._where('uid','==',UID));
    const snap = await db._getDocs(q);
    return snap.docs.map(d => d.data());
  } catch(e) { console.error('fbGetAll:', e); return []; }
}

async function syncFromFirebase() {
  const [projects, tasks, subtasks, notes] = await Promise.all([
    fbGetAll('projects'), fbGetAll('tasks'), fbGetAll('subtasks'), fbGetAll('notes')
  ]);
  
  if (projects.length) S.projects = projects.map(p => ({ id:p.id, name:p.name, color:p.color }));
  if (tasks.length) S.tasks = tasks.map(t => ({ id:t.id, title:t.title, done:t.done||false, projectId:t.projectId||'', deadline:t.deadline||null, taskTime:t.taskTime||null, notes:t.notes||'', priority:t.priority||'', createdAt:t.createdAt||Date.now() }));
  if (subtasks.length) S.subtasks = subtasks.map(s => ({ id:s.id, taskId:s.taskId, title:s.title, done:s.done||false }));
  if (notes.length) S.notes = notes.map(n => ({ id:n.id, title:n.title||'', body:n.body||'', color:n.color||NOTE_COLORS[0], createdAt:n.createdAt||Date.now(), updatedAt:n.updatedAt||Date.now() }));
  
  if (!S.projects.length) await createDefaultProjects();
  checkRecurring(); saveLocal(); renderAll();
}

async function createDefaultProjects() {
  const defs = [
    { id:'inbox', name:'Входящие', color:'#7c6aff' },
    { id:'work', name:'Работа', color:'#60a5fa' },
    { id:'personal', name:'Личное', color:'#34d399' }
  ];
  S.projects = defs;
  for (const p of defs) await fbSet('projects', p.id, p);
}

async function syncNow() {
  if (!fbAvailable) { showConfigBanner(); return; }
  ss('syncing');
  try { await syncFromFirebase(); ss('synced'); toast('Синхронизировано!'); }
  catch(e) { ss('pending'); toast('Ошибка: ' + e.message); }
}
window.syncNow = syncNow;

// ========== THEME ==========
window.toggleTheme = function() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('tf_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').setAttribute('content', isLight ? '#f4f4f8' : '#7c6aff');
}
window.loadTheme = function() {
  const t = localStorage.getItem('tf_theme');
  if (t === 'light') { document.body.classList.add('light'); document.getElementById('themeBtn').textContent = '☀️'; document.querySelector('meta[name="theme-color"]').content = '#f4f4f8'; }
}

// ========== SYNC STATUS ==========
function ss(s) {
  const b = document.getElementById('syncBtn'), l = document.getElementById('syncLabel');
  b.className = 'sync-btn ' + s;
  if (s==='synced') l.textContent = 'Синхронизировано';
  else if (s==='syncing') l.textContent = 'Синхронизация...';
  else l.textContent = fbAvailable ? 'Не синхронизировано' : 'Настрой Firebase';
}

// ========== UTILS ==========
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function gp(id) { return S.projects.find(p=>p.id===id) || { name:'Входящие', color:'#7c6aff' }; }
function gsubs(tid) { return S.subtasks.filter(s=>s.taskId===tid); }
function fmtAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  if (diff < 60000) return 'только что';
  if (diff < 3600000) return Math.floor(diff/60000) + 'м назад';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'ч назад';
  return new Date(ts).toLocaleDateString('ru', {day:'numeric',month:'short'});
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }

// ========== PROJECTS ==========
function renderProjects() {
  const el = document.getElementById('projScroll');
  el.innerHTML = '';
  const mkChip = (pid, label, cnt, active, color) => {
    const d = document.createElement('div');
    d.className = 'proj-chip' + (active ? ' active' : '');
    if (active && color) d.style.background = color;
    d.innerHTML = `<div class="chip-dot" style="background:${color||'#7c6aff'}"></div>${esc(label)}<span class="chip-cnt">${cnt}</span>`;
    d.onclick = () => { S.activeProject = pid; renderAll(); };
    return d;
  };
  el.appendChild(mkChip('all', 'Все', S.tasks.filter(t=>!t.done).length, S.activeProject==='all', '#7c6aff'));
  S.projects.forEach(p => el.appendChild(mkChip(p.id, p.name, S.tasks.filter(t=>t.projectId===p.id&&!t.done).length, S.activeProject===p.id, p.color)));
  const add = document.createElement('div');
  add.className = 'add-proj-chip'; add.textContent = '+';
  add.onclick = () => { renderColors(); openModal('projModal'); setTimeout(() => document.getElementById('projName').focus(), 100); };
  el.appendChild(add);
}

function renderColors() {
  document.getElementById('colorPicker').innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'csw' + (c===selColor?' selected':'');
    sw.style.background = c;
    sw.onclick = () => { selColor = c; renderColors(); };
    document.getElementById('colorPicker').appendChild(sw);
  });
}

async function saveProject() {
  const name = document.getElementById('projName').value.trim();
  if (!name) return;
  const p = { id: Date.now().toString(), name, color: selColor };
  S.projects.push(p); saveLocal(); renderAll();
  closeModal('projModal'); document.getElementById('projName').value = '';
  await fbSet('projects', p.id, p);
}
window.saveProject = saveProject;

// ========== TASKS ==========
async function addTask() {
  const inp = document.getElementById('newTaskInp'), title = inp.value.trim();
  if (!title) return;
  const pid = S.activeProject==='all' ? (S.projects[0]?.id||'inbox') : S.activeProject;
  const t = { id: Date.now().toString(), title, done: false, projectId: pid, createdAt: Date.now(), deadline: null, taskTime: null, notes: '', priority: '' };
  S.tasks.unshift(t); inp.value = ''; saveLocal(); renderAll();
  await fbSet('tasks', t.id, t);
}

async function toggleTask(id, e) {
  if (e) e.stopPropagation();
  const t = S.tasks.find(x=>x.id===id); if (!t) return;
  t.done = !t.done; saveLocal(); renderAll();
  await fbSet('tasks', t.id, t);
}

async function deleteTask() {
  if (!curTask) return;
  const id = curTask; curTask = null;
  S.tasks = S.tasks.filter(t=>t.id!==id);
  S.subtasks = S.subtasks.filter(s=>s.taskId!==id);
  closeModal('detailModal'); saveLocal(); renderAll();
  await fbDel('tasks', id);
}
window.deleteTask = deleteTask;

function openDetail(id) {
  curTask = id;
  const t = S.tasks.find(x=>x.id===id); if (!t) return;
  const p = gp(t.projectId);
  const dc = document.getElementById('detailCheck');
  dc.className = 'detail-check' + (t.done?' done':'');
  dc.style.borderColor = p.color; dc.style.background = t.done ? p.color : 'transparent';
  dc.style.color = t.done ? '#fff' : 'transparent';
  document.getElementById('detailTitle').value = t.title;
  document.getElementById('detailNote').value = t.notes || '';
  document.getElementById('detailDate').value = t.deadline ? new Date(t.deadline).toISOString().split('T')[0] : '';
  document.getElementById('detailTime').value = t.taskTime || '';
  document.getElementById('detailProj').innerHTML = S.projects.map(p2 =>
    `<option value="${p2.id}"${p2.id===t.projectId?' selected':''}>${esc(p2.name)}</option>`).join('');
  selPrio = t.priority || '';
  document.querySelectorAll('.prio-btn').forEach(b => {
    b.className = 'prio-btn';
    if (b.dataset.p === selPrio) b.classList.add('active-'+selPrio);
  });
  selRecur = t.recur || '';
  document.querySelectorAll('#recurBtns .prio-btn').forEach(b => {
    b.className = 'prio-btn';
    if (b.dataset.r === selRecur) b.classList.add('active-low');
  });
  renderSubs(); openModal('detailModal');
}

async function saveDetail() {
  const t = S.tasks.find(x=>x.id===curTask); if (!t) return;
  t.title = document.getElementById('detailTitle').value.trim() || t.title;
  t.notes = document.getElementById('detailNote').value;
  t.projectId = document.getElementById('detailProj').value;
  t.priority = selPrio;
  t.recur = selRecur;
  const dv = document.getElementById('detailDate').value;
  const tv = document.getElementById('detailTime').value;
  if (dv) { const d = new Date(dv); if(tv){const[h,m]=tv.split(':');d.setHours(+h,+m,0,0);} t.deadline=d.getTime(); } else t.deadline=null;
  t.taskTime = tv || null;
  saveLocal(); renderAll();
  await fbSet('tasks', t.id, t);
}
window.saveDetail = saveDetail;

window.setPrio = function(p) {
  selPrio = selPrio===p ? '' : p;
  document.querySelectorAll('.prio-btn').forEach(b => {
    b.className = 'prio-btn';
    if (b.dataset.p === selPrio) b.classList.add('active-'+selPrio);
  });
};

window.setRecur = function(r) {
  selRecur = r;
  document.querySelectorAll('#recurBtns .prio-btn').forEach(b => {
    b.className = 'prio-btn';
    if (b.dataset.r === r) b.classList.add('active-low');
  });
};

async function toggleDetailCheck() {
  const t = S.tasks.find(x=>x.id===curTask); if (!t) return;
  t.done = !t.done;

const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const WDAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function dayTasks(y,m,d) { return S.tasks.filter(t=>{if(!t.deadline)return false;const td=new Date(t.deadline);return td.getFullYear()===y&&td.getMonth()===m&&td.getDate()===d;}); }

function renderCal() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('calTitle').textContent = MONTHS[m] + ' ' + y;
  const today = new Date(); today.setHours(0,0,0,0);
  const grid = document.getElementById('calGrid');
  grid.innerHTML = WDAYS.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
  let dow = new Date(y,m,1).getDay()-1; if(dow<0) dow=6;
  const dim = new Date(y,m+1,0).getDate(), dip = new Date(y,m,0).getDate();
  for(let i=0;i<Math.ceil((dow+dim)/7)*7;i++){
    let day,mo=m,yr=y,other=false;
    if(i<dow){day=dip-dow+i+1;mo=m-1;if(mo<0){mo=11;yr--;}other=true;}
    else if(i>=dow+dim){day=i-dow-dim+1;mo=m+1;if(mo>11){mo=0;yr++;}other=true;}
    else day=i-dow+1;
    const dd=new Date(yr,mo,day);dd.setHours(0,0,0,0);
    const cell=document.createElement('div');
    cell.className='cal-day'+(other?' other':'')+(dd.getTime()===today.getTime()?' today':'')
      +(calDay&&calDay.getTime()===dd.getTime()?' selected':'')+(dayTasks(yr,mo,day).length?' has-tasks':'');
    cell.textContent=day;
    const _y=yr,_m=mo,_d=day;
    cell.onclick=()=>{calDay=new Date(_y,_m,_d);calDay.setHours(0,0,0,0);renderCal();renderCalPanel();};
    grid.appendChild(cell);
  }
  renderCalPanel();
}

async function runAI() {
  const inp = document.getElementById('aiInput'), text = inp.value.trim(); if(!text) return;
  document.getElementById('aiThinking').classList.add('show');
  document.getElementById('aiBtn').disabled = true;
  try {
    const res = await fetch(CLAUDE_URL, {method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,
        messages:[{role:'user',content:`Parse this Russian task: "${text}". Today is ${new Date().toLocaleDateString('ru')}. Projects: ${S.projects.map(p=>p.name).join(', ')}. Return ONLY JSON: {"title":"...","date":"YYYY-MM-DD or null","time":"HH:MM or null","project":"name or null","priority":"high|med|low or null","notes":"extra or null"}`}]})});
    const data = await res.json();
    const parsed = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    const proj = S.projects.find(p=>p.name.toLowerCase()===(parsed.project||'').toLowerCase()) || S.projects[0] || {id:'inbox'};
    let deadline = null;
    if (parsed.date) { const d=new Date(parsed.date); if(parsed.time){const[h,m]=parsed.time.split(':');d.setHours(+h,+m,0,0);} deadline=d.getTime(); }
    const t = {id:Date.now().toString(),title:parsed.title||text,done:false,projectId:proj.id,createdAt:Date.now(),deadline,taskTime:parsed.time||null,notes:parsed.notes||'',priority:parsed.priority||''};
    S.tasks.unshift(t); inp.value=''; saveLocal(); renderAll(); toast('✦ AI: '+t.title);
    await fbSet('tasks', t.id, t);
  } catch(e) {
    const t={id:Date.now().toString(),title:text,done:false,projectId:S.projects[0]?.id||'inbox',createdAt:Date.now(),deadline:null,taskTime:null,notes:'',priority:''};
    S.tasks.unshift(t); inp.value=''; saveLocal(); renderAll(); toast('Задача добавлена');
    await fbSet('tasks', t.id, t);
  }
  document.getElementById('aiThinking').classList.remove('show');
  document.getElementById('aiBtn').disabled = false;
}

function initMic() {
  const btn=document.getElementById('micBtn'),inp=document.getElementById('aiInput');
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){btn.style.display='none';return;}
  const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang='ru-RU';rec.continuous=false;rec.interimResults=true;let running=false;
  rec.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;inp.value=t;};
  rec.onend=()=>{running=false;btn.classList.remove('recording');};
  btn.onclick=()=>{if(running)rec.stop();else{rec.start();running=true;btn.classList.add('recording');}};
}

// ========== RECURRING ==========
function checkRecurring() {
  const today = new Date(); today.setHours(0,0,0,0);
  S.tasks.filter(t => t.recur && t.done).forEach(t => {
    const last = new Date(t.deadline || t.createdAt); last.setHours(0,0,0,0);
    let next = new Date(last);
    if (t.recur==='daily') next.setDate(next.getDate()+1);
    else if (t.recur==='weekly') next.setDate(next.getDate()+7);
    else if (t.recur==='monthly') next.setMonth(next.getMonth()+1);
    if (next <= today && !S.tasks.find(x => x.title===t.title && !x.done && x.recur===t.recur)) {
      const nt = {id:Date.now().toString()+'r',title:t.title,done:false,projectId:t.projectId,
        createdAt:Date.now(),deadline:next.getTime(),taskTime:t.taskTime,notes:t.notes,
        priority:t.priority,recur:t.recur};
      S.tasks.unshift(nt); fbSet('tasks', nt.id, nt);
    }
  });
}

// ========== INIT ==========
async function init() {
  loadLocal();
  loadTheme();
  if (!S.projects.length) {
    S.projects = [{id:'inbox',name:'Входящие',color:'#7c6aff'},{id:'work',name:'Работа',color:'#60a5fa'},{id:'personal',name:'Личное',color:'#34d399'}];
  }
  checkRecurring();
  renderAll(); initMic();
  await initFirebase();
}
init();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
